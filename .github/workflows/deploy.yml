name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "/home/ubuntu/CIM_demo" ]; then
              git clone https://github.com/<your-username>/CIM_demo.git /home/ubuntu/CIM_demo
            fi
            cd /home/ubuntu/CIM_demo
            bash deploy.sh
